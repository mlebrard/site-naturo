<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marie-Laure Ebrard — Naturopathe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #F5F0EB;
      color: #2C2C2C;
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background-color: #FEFCF8;
      border-top: 4px solid #7A9E7E;
      border-radius: 4px;
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(61, 90, 64, 0.08);
    }

    .badge {
      display: inline-block;
      background-color: #7A9E7E;
      color: #FEFCF8;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #3D5A40;
      line-height: 1.25;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #6B6B6B;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #C4956A;
      margin: 0 auto 2rem;
    }

    .message {
      font-size: 1rem;
      color: #6B6B6B;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #3D5A40;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
      border: 1.5px solid #7A9E7E;
      border-radius: 4px;
      transition: background-color 0.2s, color 0.2s;
    }

    .contact-link:hover {
      background-color: #7A9E7E;
      color: #FEFCF8;
    }

    .contact-link.email {
      background-color: #C4956A;
      border-color: #C4956A;
      color: #FEFCF8;
    }

    .contact-link.email:hover {
      background-color: #b07e55;
      border-color: #b07e55;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Site en construction</div>

    <h1>Marie-Laure Ebrard</h1>
    <p class="subtitle">Naturopathe diplômée — Cestas (33)</p>

    <div class="divider"></div>

    <p class="message">
      Mon site est en cours de création.<br>
      En attendant, n'hésitez pas à me contacter directement.
    </p>

    <div class="contacts">
      <a class="contact-link" href="tel:+33681601035">
        📞 06 81 60 10 35
      </a>
      <a class="contact-link email" href="mailto:mlebrard@sbe33.fr">
        ✉ mlebrard@sbe33.fr
      </a>
    </div>
  </div>
</body>
</html>
